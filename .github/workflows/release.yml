name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk YTSummary.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Bản cập nhật ${{ github.ref_name }}
            - Xem chi tiết thay đổi trong CHANGELOG.md.
            - Tính năng mới và các bản vá lỗi được cập nhật liên tục.
          files: YTSummary.apk
          token: ${{ secrets.GITHUB_TOKEN }}

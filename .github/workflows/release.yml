name: Create Release v1.0.4

on:
  push:
    tags:
      - 'v1.0.4'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release-unsigned.apk YTSummary.apk || mv app/build/outputs/apk/release/app-release.apk YTSummary.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.4
          name: Release v1.0.4 - Tts Robustness Update
          body: |
            ## Bản cập nhật v1.0.4
            - Sửa lỗi Pause/Resume TTS (Text-to-Speech) bị lệch vị trí.
            - Tối ưu hóa việc tracking tiến trình đọc theo từng chunk.
            - Cải thiện độ ổn định khi xử lý ranh giới các đoạn văn dài.
            - Nâng cấp hiệu năng xử lý state trong TtsManager.
          files: YTSummary.apk
          token: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release YTSummary

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Dynamically Update Year in README.md
        run: |
          echo "📅 Automating copyright year synchronization at build time..."
          CURRENT_YEAR=$(date +%Y)
          sed -i "s/{this_year}/$CURRENT_YEAR/g" README.md
          cat README.md | grep "Copyright" || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Prepare Keystore and Signing Environment
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "⚠️ secrets.KEYSTORE_BASE64 is empty. Creating a temporary self-signed keystore to guarantee build success..."
            keytool -genkey -v -keystore skul9x.jks -alias temp_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass temp_storepass -keypass temp_keypass -dname "CN=Nguyen Duy Truong, OU=YTSummary, O=Skul9x, L=Hanoi, S=Hanoi, C=VN"
            echo "STORE_PASSWORD=temp_storepass" >> $GITHUB_ENV
            echo "KEY_PASSWORD=temp_keypass" >> $GITHUB_ENV
            echo "KEY_ALIAS=temp_alias" >> $GITHUB_ENV
          else
            echo "✅ Keystore secret found. Decoding production keystore..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > skul9x.jks
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          fi

      - name: Build signed Release APK
        env:
          STORE_PASSWORD: ${{ env.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Prepare APK for Release
        run: |
          apk_path=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$apk_path" ]; then
            echo "❌ Release APK not found!"
            exit 1
          fi
          echo "Copying $apk_path to YTSummary-v1.0.8.apk"
          cp "$apk_path" YTSummary-v1.0.8.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.8
          name: Release v1.0.8
          draft: false
          prerelease: false
          files: |
            YTSummary-v1.0.8.apk
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Android Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode Keystore
        run: echo "$KEYSTORE_BASE64" | base64 --decode > skul9x.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Verify Keystore exists
        run: ls -la skul9x.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: mv app/build/outputs/apk/release/*.apk "app/build/outputs/apk/release/YT Summary.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "app/build/outputs/apk/release/YT Summary.apk"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Release v1.0.7"
          files: "app/build/outputs/apk/release/YT Summary.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Android Release APK

on:
  push:
    tags:
      - 'v*' # Trigger khi push tag có dạng v1.0.0...
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > app/release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease --stacktrace -PKEYSTORE_FILE="release.jks" -PSTORE_PASSWORD="${{ secrets.STORE_PASSWORD }}" -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      - name: Rename and Prepare APK
        run: |
          cd app/build/outputs/apk/release/
          mv *.apk "YT Summary.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "app/build/outputs/apk/release/YT Summary.apk"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Release v1.0.7"
          files: "app/build/outputs/apk/release/YT Summary.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
